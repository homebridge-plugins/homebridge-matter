name: Release

# This workflow handles both latest and beta releases:
# - Latest: Triggered by GitHub releases (tag vX.Y.Z)
# - Beta: Triggered by pushes to beta-X.Y.Z branches

on:
  release:
    types: [published]
  push:
    branches: [beta-*.*.*]

permissions:
  id-token: write
  contents: read

jobs:
  eslint:
    uses: homebridge/.github/.github/workflows/eslint.yml@latest

  publish:
    if: ${{ github.repository == 'homebridge-plugins/homebridge-matter' }}
    needs: eslint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Determine release type
        id: release-type
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "type=latest" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "type=beta" >> $GITHUB_OUTPUT
            echo "tag=beta" >> $GITHUB_OUTPUT
          fi

      - name: Handle beta versioning
        if: steps.release-type.outputs.type == 'beta'
        run: |
          # Download versioning script from homebridge/.github
          mkdir -p .github
          wget -q https://raw.githubusercontent.com/homebridge/.github/latest/.github/npm-version-script-esm.js -O .github/npm-version-script-esm.js

          # Run the script to set base version
          node .github/npm-version-script-esm.js ${{ github.ref }} beta

          # Add prerelease suffix
          npm version pre --preid=beta --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish to npm with OIDC
        run: npm publish --tag ${{ steps.release-type.outputs.tag }} --provenance --access public
